name: CI

# Temporarily disabled: auto-triggers removed while CI is hanging.
# Implementation is preserved; re-enable by restoring `push:` and `pull_request:` below.
on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install apt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck shfmt

      - name: Install pipx and bashate
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          ~/.local/bin/pipx install bashate

      - name: Install cargo tools
        run: |
          cargo install --locked shellharden

      - name: Install pre-commit
        run: python -m pip install --user pre-commit

      - name: Run shellcheck
        run: bash -O globstar -c 'shellcheck -x bin/* lib/**/*.sh'

      - name: Run shfmt
        run: shfmt -d -i 2 -ci -bn -s bin/ lib/ hooks/ tests/

      - name: Run pre-commit
        run: ~/.local/bin/pre-commit run --all-files

      - name: Run deferred/active safety gates
        run: |
          make gate-no-eval
          make gate-no-raw-ansi
          make gate-one-public-fn-per-file

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats

      - name: Run bats suite
        run: bats -r tests/
