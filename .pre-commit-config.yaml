default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      # pretty-format-json omitted: repo has no plain .json files (all are JSONC devcontainer.json)
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-shebang-scripts-are-executable
      - id: no-commit-to-branch
        args: [--branch, staging, --branch, main, --branch, master]

  - repo: https://github.com/maresb/check-json5
    rev: v1.0.1
    hooks:
      - id: check-json5

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ["-i", "2", "-ci"]

  # shellharden – auto-quote variables and command substitutions
  - repo: local
    hooks:
      - id: shellharden
        name: shellharden
        language: system
        entry: shellharden --replace
        types: [shell]

  - repo: https://github.com/openstack/bashate
    rev: 2.1.1
    hooks:
      - id: bashate
        args: ["-i", "E003,E006", "-e", "E005"]
        exclude: ^tests/(.*\.bats|test_helper\.bash)$

  - repo: https://github.com/crate-ci/typos
    rev: v1.44.0
    hooks:
      - id: typos
        args: ["--write-changes"]
        exclude: ^images/.*/Dockerfile$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        stages: [commit-msg]
        types_or: [text]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
      - id: commitizen-branch
        stages: [pre-push]

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: local
    hooks:
      - id: bats-tests
        name: bats tests
        language: system
        entry: bats tests
        pass_filenames: false
        always_run: true
