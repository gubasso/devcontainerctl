default_install_hook_types: [pre-commit, commit-msg, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      # pretty-format-json omitted intentionally: the only plain .json file (devcontainers/agents/seccomp-bwrap.json) is hand-written and reads better with the structure it has; check-json5 already validates syntax
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-shebang-scripts-are-executable
      - id: no-commit-to-branch
        args: [--branch, staging, --branch, main, --branch, master]

  - repo: https://github.com/maresb/check-json5
    rev: v1.0.1
    hooks:
      - id: check-json5

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2", "-ci", "-bn", "-s"]
        files: '\.(sh|bash|bats)$|^bin/dctl$|^hooks/post-stow$'

  # shellharden – auto-quote variables and command substitutions
  - repo: local
    hooks:
      - id: shellharden
        name: shellharden
        language: system
        entry: shellharden --replace
        types: [shell]

  - repo: https://github.com/openstack/bashate
    rev: 2.1.1
    hooks:
      - id: bashate
        args: ["-i", "E003,E006", "-e", "E005"]
        exclude: ^tests/(.*\.bats|test_helper\.bash)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint
        stages: [commit-msg]
        types_or: [text]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen

  # Slides sub-project (Slidev) ----------------------------------------------
  # Prettier formats Markdown, Vue, TS, JSON inside slides/ only.
  # rbubley fork is used because pre-commit/mirrors-prettier is archived.
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.8.3
    hooks:
      - id: prettier
        args: [--write]
        files: ^slides/.*\.(md|vue|ts|js|json|ya?ml|css)$
        # slides/slides.md and slides/pages/*.md use Slidev's per-slide
        # frontmatter syntax (`---\nlayout: foo\n---`), which prettier
        # mangles into setext H2 headings and breaks the deck. Keep them
        # out — see slides/.prettierignore for the same rule honored by
        # any direct `npx prettier` invocation.
        exclude: |
          (?x)^slides/(
            node_modules|
            dist|
            \.slidev|
            package-lock\.json|
            slides\.md|
            pages/.*\.md
          )

  - repo: meta
    hooks:
      - id: check-hooks-apply
      - id: check-useless-excludes

  - repo: local
    hooks:
      - id: check-no-docker
        name: check-no-docker grep gate
        language: system
        entry: make check-no-docker
        pass_filenames: false
        always_run: true
      - id: bats-unit
        name: bats unit tests
        language: system
        entry: bats --filter-tags 'unit,!integration' tests
        pass_filenames: false
        always_run: true
      - id: bats-integration
        name: bats integration tests
        language: system
        entry: bats --filter-tags integration tests
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      # slidev build – catches deck breakages before pushing to GitHub Pages.
      # Requires slides/node_modules (run `npm ci` in slides/ first).
      - id: slidev-build
        name: slidev build
        language: system
        entry: bash -c 'cd slides && mise exec -- npm run build'
        files: ^slides/
        pass_filenames: false
        stages: [pre-push]
